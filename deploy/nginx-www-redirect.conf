# Redirect the www host to the canonical apex domain.
# Add this server block before the main nicolasquiroga.com.ar HTTPS server.
server {
  listen 443 ssl http2;
  server_name www.nicolasquiroga.com.ar;

  ssl_certificate /etc/letsencrypt/live/nicolasquiroga.com.ar/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/nicolasquiroga.com.ar/privkey.pem;

  return 301 https://nicolasquiroga.com.ar$request_uri;
}

server {
  listen 80;
  server_name www.nicolasquiroga.com.ar;

  return 301 https://nicolasquiroga.com.ar$request_uri;
}
